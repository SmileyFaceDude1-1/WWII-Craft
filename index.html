<!DOCTYPE html>
<html>
<head>
  <title>WWII Craft Game</title>
  <style>
    body {
      font-family: Arial;
      background-color: #1a1a1a;
      color: white;
      text-align: center;
    }

    select, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }

    #log {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #555;
      height: 200px;
      overflow-y: auto;
      text-align: left;
    }
  </style>
</head>

<body>

<h1>🌍 WWII Infinite Craft</h1>

<h3>Select Two Elements</h3>

<select id="item1"></select>
<select id="item2"></select>

<br>

<button onclick="combineItems()">Combine</button>
<button onclick="resetGame()">End Game</button>

<div id="log"></div>

<script>
// ----------------------------
// INITIALIZATION
// ----------------------------
let discovered = new Set([
  " ", "Bomb", "Atom", "Uranium", "Plutonium", "Surrender", "USS Missouri", "Letter to Roosevelt", "Poland", "Japan", "Germany", "Soviet Union", "Egypt", "England", "United States Navy", "Japanese Navy", "United States", "German Capital", "Allies", "Nagasaki", "East Germany", "Pearl Harbor", "Operation Barbarossa", "Operation Uranus", "Hitler", "Emperor Hirohito", "Albert Einstein", "Harry Truman", "Winston Churchill", "August 6th, 1945", "August 9th, 1945", "June 22nd, 1941"
]);

let recipes = [
  { a: "Uranium", b: "Bomb", result: "Atomic bomb" },
  { a: "Japan", b: "United States", result: "America joining War" }
];

// ----------------------------
// UPDATE DROPDOWNS
// ----------------------------
function updateDropdowns() {
  let item1 = document.getElementById("item1");
  let item2 = document.getElementById("item2");

  item1.innerHTML = "";
  item2.innerHTML = "";

  discovered.forEach(item => {
    let option1 = document.createElement("option");
    option1.text = item;
    item1.add(option1);

    let option2 = document.createElement("option");
    option2.text = item;
    item2.add(option2);
  });
}

// ----------------------------
// LOG FUNCTION
// ----------------------------
function log(message) {
  let logDiv = document.getElementById("log");
  logDiv.innerHTML += message + "<br>";
  logDiv.scrollTop = logDiv.scrollHeight;
}

// ----------------------------
// COMBINE LOGIC (FLOWCHART CORE)
// ----------------------------
function combineItems() {
  let item1 = document.getElementById("item1").value;
  let item2 = document.getElementById("item2").value;

  log("Combining: " + item1 + " + " + item2);

  // VALIDATION CHECK
  if (!discovered.has(item1) || !discovered.has(item2)) {
    log("❌ Invalid selection");
    return;
  }

  // COMBINATION CHECK
  let recipe = recipes.find(r =>
    (r.a === item1 && r.b === item2) ||
    (r.a === item2 && r.b === item1)
  );

  if (recipe) {
    // YES PATH
    if (!discovered.has(recipe.result)) {
      discovered.add(recipe.result);
      log("✅ New Discovery: " + recipe.result);
      updateDropdowns();
    } else {
      log("⚠️ Already discovered: " + recipe.result);
    }
  } else {
    // NO PATH
    log("❌ No combination found");
  }
}

// ----------------------------
// END GAME
// ----------------------------
function resetGame() {
  log("Game Ended");
}

// ----------------------------
// START
// ----------------------------
updateDropdowns();
log("Game Started");
</script>

</body>
</html>
